services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: athens_recycling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        - NEXT_PUBLIC_ANALYTICS_SCRIPT_URL=${NEXT_PUBLIC_ANALYTICS_SCRIPT_URL:-}
        - NEXT_PUBLIC_ANALYTICS_SITE_ID=${NEXT_PUBLIC_ANALYTICS_SITE_ID:-}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/athens_recycling
      AI_API_BASE_URL: ${AI_API_BASE_URL:-https://openrouter.ai/api/v1}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-minimax/m2.7}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  # Run migrations and seed on startup
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    command: >
      sh -c "npx prisma db push --skip-generate && 
             npx tsx prisma/seed.ts &&
             echo '✅ Migration and seed complete'"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/athens_recycling
      SKIP_ENV_VALIDATION: 1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
