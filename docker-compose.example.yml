# Copy this file to docker-compose.yml and fill in your values:
#   cp docker-compose.example.yml docker-compose.yml

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: change-me-to-a-strong-password
      POSTGRES_DB: athens_recycling
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=https://recycleathens.com
        - NEXT_PUBLIC_ANALYTICS_SCRIPT_URL=
        - NEXT_PUBLIC_ANALYTICS_SITE_ID=
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_TRUST_HOST: "true"
      DATABASE_URL: postgresql://postgres:change-me-to-a-strong-password@db:5432/athens_recycling
      AI_API_BASE_URL: https://openrouter.ai/api/v1
      AI_API_KEY: your-openrouter-api-key
      AI_MODEL: meta-llama/llama-3.3-70b-instruct:free
      AUTH_SECRET: generate-with-openssl-rand-base64-32
      AUTH_GOOGLE_ID: your-google-oauth-client-id
      AUTH_GOOGLE_SECRET: your-google-oauth-client-secret
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

  # Run migrations and seed on startup
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    command: >
      sh -c "npx prisma db push --skip-generate && 
             npx tsx prisma/seed.ts &&
             echo '✅ Migration and seed complete'"
    environment:
      DATABASE_URL: postgresql://postgres:change-me-to-a-strong-password@db:5432/athens_recycling
      SKIP_ENV_VALIDATION: 1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
